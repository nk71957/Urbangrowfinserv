<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Face Detection -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body { background:#f5f5f5; }
    .card {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
    }
    video { border-radius:10px; }
  </style>
</head>

<body>

<div class="card shadow">
  <h4 class="text-center mb-3">Attendance</h4>

  <form action="https://formsubmit.co/urbangrowfinservpvt@gmail.com" method="POST" enctype="multipart/form-data">

    <input type="text" name="EmpID" class="form-control mb-2" placeholder="Employee ID" required>
    <input type="text" name="Name" class="form-control mb-2" placeholder="Name" required>

    <video id="video" width="100%" autoplay muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <input type="file" name="attachment" id="photoFile" style="display:none;">

    <input type="hidden" name="Location" id="locationData">

    <button type="submit" class="btn btn-success w-100 mt-3">Submit</button>
  </form>
</div>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => video.srcObject = stream)
.catch(() => alert("Camera permission denied"));

async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri(
    'https://justadudewhohacks.github.io/face-api.js/models'
  );
}
loadModels();

function capturePhoto() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  canvas.toBlob(blob => {
    const file = new File([blob], "attendance.png", { type: "image/png" });

    const dt = new DataTransfer();
    dt.items.add(file);

    document.getElementById('photoFile').files = dt.files;
  });
}

function autoCapture() {
  setInterval(async () => {
    const detections = await faceapi.detectAllFaces(
      video,
      new faceapi.TinyFaceDetectorOptions()
    );

    if (detections.length > 0) {
      capturePhoto();
      console.log("Face detected → Photo captured");
    }
  }, 3000);
}

video.addEventListener('play', autoCapture);

navigator.geolocation.getCurrentPosition(async pos => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const data = await res.json();

    const address = data.display_name;

    document.getElementById('locationData').value =
      `Lat:${lat}, Lon:${lon}, Address:${address}`;

  } catch {
    document.getElementById('locationData').value =
      `Lat:${lat}, Lon:${lon}`;
  }
});


document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    alert("Don't switch tab!");
  }
});
</script>

</body>
</html>
